<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mock CR IA</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6f8;
    }

    #loading, #info {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }

    #info {
      color: orange;
    }

    .container {
      display: none;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="loading">⏳ Initialisation...</div>
<div id="info" style="display:none;"></div>

<div class="container" id="app">
  <h3>📄 Comptes rendus</h3>
  <div id="list"></div>
</div>

<script>

console.log("[MOCK-IA] 📄 Script chargé");

let userContext = {
  userId: null,
  source: "INIT"
};

/* ============================
   LIFECYCLE GENESYS
============================ */

window.addEventListener("message", (event) => {
  console.log("[MOCK-IA] 📩 Message reçu:", event.data);

  if (!event.data || typeof event.data !== "object") return;

  const type = event.data.type || "";
  const body = event.data.eventBody || {};

  switch (type) {
    case "purecloud.client.lifecycle.bootstrap":
      console.log("[MOCK-IA] ✅ BOOTSTRAP reçu");
      handleBootstrap(body);
      break;

    case "purecloud.client.lifecycle.focus":
      console.log("[MOCK-IA] 👀 FOCUS widget");
      break;

    case "purecloud.client.lifecycle.blur":
      console.log("[MOCK-IA] 😴 BLUR widget");
      break;

    case "purecloud.client.lifecycle.stop":
      console.log("[MOCK-IA] 🛑 STOP widget");
      break;

    default:
      console.log("[MOCK-IA] ℹ️ Autre event:", type);
  }
});

/* ============================
   HANDLERS
============================ */

function handleBootstrap(body) {
  console.log("[MOCK-IA] 🔍 Bootstrap data:", body);

  // ⚠️ Selon Genesys → body est souvent vide
  if (body && body.userId) {
    userContext.userId = body.userId;
    userContext.source = "GENESYS";
  } else {
    console.warn("[MOCK-IA] ⚠️ Aucun userId dans bootstrap → fallback");
    fallbackUser();
  }

  startApp();
}

/* ============================
   FALLBACK
============================ */

function fallbackUser() {
  console.warn("[MOCK-IA] 🧪 MODE FALLBACK");

  userContext.userId = "mock-agent";
  userContext.source = "FALLBACK";
}

/* ============================
   APP INIT
============================ */

function startApp() {
  console.log("[MOCK-IA] 🚀 Démarrage app avec:", userContext);

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("info").style.display = "block";
  document.getElementById("info").innerText =
    `Source: ${userContext.source} | User: ${userContext.userId}`;

  initApp();
}

/* ============================
   APP UI
============================ */

function initApp() {
  console.log("[MOCK-IA] 📦 initApp");

  const data = [
    { title: "Client Dupont", date: "21/05" },
    { title: "SAV technique", date: "20/05" }
  ];

  const container = document.getElementById("list");

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${item.title}</b><br>${item.date}`;
    container.appendChild(div);
  });
}

/* ============================
   FALLBACK TIMEOUT
============================ */

setTimeout(() => {
  if (!userContext.userId) {
    console.warn("[MOCK-IA] ⏳ Aucun bootstrap reçu → fallback auto");
    fallbackUser();
    startApp();
  }
}, 1500);


/* ============================
   DEBUG GLOBAL
============================ */

window.addEventListener("error", (e) => {
  console.error("[MOCK-IA] 💥 JS ERROR:", e.message);
});

</script>

</body>
</html>
