<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Comptes rendus</title>

  <!-- SDK Genesys -->
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6f8;
    }

    .container {
      padding: 10px;
      display: none;
    }

    #loading, #info {
      text-align: center;
      margin-top: 50px;
    }

    #info {
      color: orange;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="loading">⏳ Chargement du SDK Genesys...</div>
<div id="info" style="display:none;"></div>

<div class="container" id="app">
  <h3>📄 Comptes rendus</h3>
  <div id="list"></div>
</div>

<script>
let userContext = {
  userId: null,
  token: null,
  source: null
};

/* ============================
   DEBUG GLOBAL
============================ */

console.log("📄 Script chargé");

window.addEventListener("error", (e) => {
  console.error("💥 JS ERROR:", e.message);
});

/* ============================
   WAIT SDK
============================ */

function waitForSDK(retries = 10) {
  console.log("🔍 Vérification SDK...");

  if (typeof platformClient !== "undefined") {
    console.log("✅ SDK disponible");
    initAuth();
  } else if (retries > 0) {
    console.warn("⏳ SDK non prêt, retry...");
    setTimeout(() => waitForSDK(retries - 1), 300);
  } else {
    console.error("❌ SDK jamais chargé !");
    fallbackUser();
    displayApp();
  }
}

/* ============================
   AUTH
============================ */

function initAuth() {
  console.log("🚀 initAuth");

  try {
    const client = platformClient.ApiClient.instance;
    console.log("✅ Client SDK:", client);

    client.setEnvironment("mypurecloud.de");

    const token = client.authData && client.authData.accessToken;

    if (token) {
      console.log("✅ Token trouvé !");
      userContext.token = token;
      userContext.userId = "genesys-user";
      userContext.source = "TOKEN";
    } else {
      console.warn("⚠️ Token non disponible");
      fallbackUser();
    }

  } catch (e) {
    console.error("❌ Erreur initAuth:", e.message);
    fallbackUser();
  }

  displayApp();
}

/* ============================
   FALLBACK
============================ */

function fallbackUser() {
  console.warn("🧪 MODE FALLBACK");

  userContext.userId = "mock-agent";
  userContext.source = "FALLBACK";
}

/* ============================
   UI
============================ */

function displayApp() {
  console.log("✅ Affichage app avec:", userContext);

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  if (userContext.source === "FALLBACK") {
    document.getElementById("info").style.display = "block";
    document.getElementById("info").innerText =
      "⚠️ Mode fallback (pas de token Genesys)";
  }

  initApp();
}

/* ============================
   APP LOGIC
============================ */

function initApp() {
  console.log("📦 initApp");

  const mockData = [
    { title: "Client Dupont", date: "21/05" },
    { title: "SAV technique", date: "20/05" }
  ];

  const container = document.getElementById("list");

  mockData.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${item.title}</b><br>${item.date}`;
    container.appendChild(div);
  });
}

/* ============================
   INIT
============================ */

waitForSDK();

</script>

</body>
</html>
``
