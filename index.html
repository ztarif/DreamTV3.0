<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mock CR IA</title>

  <!-- ✅ SDK CORRECT -->
  <script src="https://sdk-cdn.mypurecloud.com/client-apps/2.6.7/purecloud-client-app-sdk.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f6f8;
    }

    #loading, #info {
      text-align: center;
      margin-top: 40px;
    }

    #info {
      color: orange;
    }

    .container {
      display: none;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="loading">⏳ Initialisation Genesys...</div>
<div id="info" style="display:none;"></div>

<div class="container" id="app">
  <h3>📄 Comptes rendus</h3>
  <div id="list"></div>
</div>

<script>

console.log("[MOCK-IA] 📄 Script chargé");

let app = null;
let userContext = {
  userId: null,
  name: null,
  source: null
};

/* ============================
   INIT CLIENT APP SDK
============================ */

function initClientApp() {
  try {
    console.log("[MOCK-IA] 🚀 Init ClientApp SDK");

    const ClientApp = window.purecloud.apps.ClientApp;

    app = new ClientApp({
      gcHostOriginQueryParam: "gcHostOrigin",
      gcTargetEnvQueryParam: "gcTargetEnv"
    });

    console.log("[MOCK-IA] ✅ ClientApp initialisé");

    setupLifecycle();
    getUserDetails();

  } catch (e) {
    console.error("[MOCK-IA] ❌ Impossible d'init ClientApp", e);
    fallbackUser();
    startApp();
  }
}

/* ============================
   LIFECYCLE HOOKS
============================ */

function setupLifecycle() {
  console.log("[MOCK-IA] 🔄 Setup lifecycle");

  app.lifecycle.addBootstrapListener(() => {
    console.log("[MOCK-IA] ✅ BOOTSTRAP reçu");
  });

  app.lifecycle.addFocusListener(() => {
    console.log("[MOCK-IA] 👀 FOCUS widget");
  });

  app.lifecycle.addBlurListener(() => {
    console.log("[MOCK-IA] 😴 BLUR widget");
  });

  app.lifecycle.addStopListener(() => {
    console.log("[MOCK-IA] 🛑 STOP widget");
  });
}

/* ============================
   USER CONTEXT
============================ */

function getUserDetails() {
  console.log("[MOCK-IA] 🔍 Récupération user Genesys...");

  app.user.getUserDetails()
    .then(user => {
      console.log("[MOCK-IA] ✅ User récupéré:", user);

      userContext.userId = user.id;
      userContext.name = user.name;
      userContext.source = "GENESYS";

      startApp();
    })
    .catch(err => {
      console.warn("[MOCK-IA] ⚠️ Impossible de récupérer user:", err);

      fallbackUser();
      startApp();
    });
}

/* ============================
   FALLBACK
============================ */

function fallbackUser() {
  console.warn("[MOCK-IA] 🧪 MODE FALLBACK");

  userContext.userId = "mock-agent";
  userContext.name = "Utilisateur local";
  userContext.source = "FALLBACK";
}

/* ============================
   START APP
============================ */

function startApp() {
  console.log("[MOCK-IA] 🚀 startApp avec :", userContext);

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("info").style.display = "block";
  document.getElementById("info").innerText =
    `Source: ${userContext.source} | User: ${userContext.name}`;

  initApp();
}

/* ============================
   UI / DATA
============================ */

function initApp() {
  console.log("[MOCK-IA] 📦 initApp");

  // 👉 Mock data (remplacé ensuite par backend)
  const data = [
    { title: "Client Dupont", date: "21/05" },
    { title: "SAV technique", date: "20/05" }
  ];

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${item.title}</b><br>${item.date}`;
    container.appendChild(div);
  });

  // ✅ Exemple backend futur
  /*
  fetch("https://api.mondomaine.com/reports", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: userContext.userId
    })
  });
  */
}

/* ============================
   DEBUG GLOBAL
============================ */

window.addEventListener("error", (e) => {
  console.error("[MOCK-IA] 💥 JS ERROR:", e.message);
});

/* ============================
   INIT
============================ */

document.addEventListener("DOMContentLoaded", () => {
  initClientApp();
});

</script>

</body>
</html>
